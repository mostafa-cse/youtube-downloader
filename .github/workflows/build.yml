name: Build All Platforms

on:
  push:
    tags: ['v*']

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller static-ffmpeg
      - name: Build EXE
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name "YT Downloader" `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --hidden-import yt_dlp `
            --hidden-import webview `
            main.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: "dist/YT Downloader.exe"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev dpkg
      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller static-ffmpeg
      - name: Build binary
        run: |
          pyinstaller --noconfirm --windowed --onefile \
            --name "yt-downloader" \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --hidden-import yt_dlp \
            --hidden-import webview \
            main.py
      - name: Package .deb
        run: |
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/DEBIAN
          cp dist/yt-downloader deb/usr/bin/
          cat > deb/DEBIAN/control << CTRL
          Package: yt-downloader
          Version: 1.3.0
          Architecture: amd64
          Maintainer: Mostafa Kamal <mostafa-cse@github.com>
          Description: Free open-source YouTube downloader GUI
          CTRL
          cat > deb/usr/share/applications/yt-downloader.desktop << DESK
          [Desktop Entry]
          Name=YT Downloader
          Exec=/usr/bin/yt-downloader
          Type=Application
          Categories=Utility;
          DESK
          dpkg-deb --build deb yt-downloader-v1.3.0.deb
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: yt-downloader-v1.3.0.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller static-ffmpeg
          brew install create-dmg
      - name: Build app
        run: |
          pyinstaller --noconfirm --windowed --onedir \
            --name "YT Downloader" \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --hidden-import yt_dlp \
            --hidden-import webview \
            main.py
      - name: Build DMG
        run: |
          create-dmg \
            --volname "YT Downloader" \
            --window-size 660 400 \
            --icon-size 120 \
            --app-drop-link 480 170 \
            "YT-Downloader-v1.3.0.dmg" \
            "dist/YT Downloader.app"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: YT-Downloader-v1.3.0.dmg

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-exe/YT Downloader.exe
            linux-deb/yt-downloader-v1.3.0.deb
            macos-dmg/YT-Downloader-v1.3.0.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
