name: Release All Platforms

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:

  # ─── WINDOWS EXE ───────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install flask pywebview yt-dlp static-ffmpeg pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name "YT-Downloader" `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --hidden-import yt_dlp `
            --hidden-import webview `
            --hidden-import flask `
            main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/YT-Downloader.exe

  # ─── LINUX DEB ──────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            gir1.2-webkit2-4.0 \
            dpkg-dev

      - name: Install Python deps
        run: |
          pip install flask pywebview yt-dlp static-ffmpeg pyinstaller

      - name: Build binary
        run: |
          pyinstaller --noconfirm --onefile \
            --name "yt-downloader" \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --hidden-import yt_dlp \
            --hidden-import webview \
            --hidden-import flask \
            main.py

      - name: Package .deb
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          cp dist/yt-downloader pkg/usr/bin/yt-downloader
          chmod +x pkg/usr/bin/yt-downloader
          cat > pkg/DEBIAN/control << CTRL
          Package: yt-downloader
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: Mostafa Kamal <mostafa-cse@github.com>
          Depends: libgtk-3-0, libwebkit2gtk-4.0-37
          Description: Free YouTube Downloader
           Open-source YouTube downloader GUI. Powered by yt-dlp. No ads.
          CTRL
          cat > pkg/usr/share/applications/yt-downloader.desktop << DESK
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=YT Downloader
          Comment=Free YouTube video downloader
          Exec=/usr/bin/yt-downloader
          Icon=yt-downloader
          Terminal=false
          Categories=Utility;Network;
          DESK
          dpkg-deb --build pkg yt-downloader-${VERSION}-amd64.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: yt-downloader-*.deb

  # ─── MACOS DMG ───────────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install flask pywebview yt-dlp static-ffmpeg pyinstaller
          brew install create-dmg

      - name: Build app
        run: |
          pyinstaller --noconfirm --windowed --onedir \
            --name "YT Downloader" \
            --icon YTDownloader.icns \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --hidden-import yt_dlp \
            --hidden-import webview \
            --hidden-import flask \
            main.py

      - name: Build DMG
        run: |
          VERSION="${{ github.ref_name }}"
          create-dmg \
            --volname "YT Downloader" \
            --window-size 660 400 \
            --icon-size 120 \
            --app-drop-link 480 170 \
            "YT-Downloader-${VERSION}.dmg" \
            "dist/YT Downloader.app" || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: YT-Downloader-*.dmg

  # ─── CREATE GITHUB RELEASE ──────────────────────────────────────────
  release:
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "YT Downloader ${{ github.ref_name }}"
          body: |
            ## YT Downloader ${{ github.ref_name }}

            ### 📥 Downloads
            | Platform | File | Install |
            |---|---|---|
            | 🪟 Windows 10/11 | `YT-Downloader.exe` | Run directly |
            | 🐧 Linux (Ubuntu/Debian) | `yt-downloader-amd64.deb` | `sudo dpkg -i *.deb` |
            | 🍎 macOS 12+ | `YT-Downloader.dmg` | Open DMG → drag to Apps |

            ### ✨ What's New in ${{ github.ref_name }}
            - Cleaned repo: removed all build artifacts, `__pycache__`, and accidentally committed downloads
            - Added MIT LICENSE file
            - Fixed CI workflows to use dynamic version from Git tag
            - macOS: added app icon (`--icon YTDownloader.icns`) to PyInstaller build
            - Improved format fallback engine for YouTube API changes
            - Live download progress, speed, ETA and terminal log
            - Cancel download at any time
            - Clear history without deleting files

            ### 📖 First Launch (macOS)
            > Right-click the app → **Open** → **Open** *(bypasses Gatekeeper — one time only)*

            ### 🛠 Run From Source
            ```bash
            git clone https://github.com/mostafa-cse/youtube-downloader.git
            cd youtube-downloader
            python3 -m venv venv
            venv/bin/pip install flask yt-dlp pywebview static-ffmpeg
            venv/bin/python main.py
            ```
          files: |
            windows-exe/YT-Downloader.exe
            linux-deb/yt-downloader-*.deb
            macos-dmg/YT-Downloader-*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
