name: Release All Platforms

on:
  workflow_dispatch:   # manual trigger button on GitHub
  push:
    tags: ['v*']

jobs:

  # ─── WINDOWS EXE ───────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install flask pywebview yt-dlp static-ffmpeg pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name "YT-Downloader" `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --hidden-import yt_dlp `
            --hidden-import webview `
            --hidden-import flask `
            main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/YT-Downloader.exe

  # ─── LINUX DEB ─────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            gir1.2-webkit2-4.0 \
            dpkg-dev

      - name: Install Python deps
        run: |
          pip install flask pywebview yt-dlp static-ffmpeg pyinstaller

      - name: Build binary
        run: |
          pyinstaller --noconfirm --onefile \
            --name "yt-downloader" \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --hidden-import yt_dlp \
            --hidden-import webview \
            --hidden-import flask \
            main.py

      - name: Package .deb
        run: |
          VERSION="1.3.0"
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/pixmaps

          cp dist/yt-downloader pkg/usr/bin/yt-downloader
          chmod +x pkg/usr/bin/yt-downloader

          cat > pkg/DEBIAN/control << CTRL
          Package: yt-downloader
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: Mostafa Kamal <mostafa-cse@github.com>
          Depends: libgtk-3-0, libwebkit2gtk-4.0-37
          Description: Free YouTube Downloader
           Open-source macOS/Linux/Windows YouTube downloader GUI.
           Powered by yt-dlp. No ads. No subscription.
          CTRL

          cat > pkg/usr/share/applications/yt-downloader.desktop << DESK
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=YT Downloader
          Comment=Free YouTube video downloader
          Exec=/usr/bin/yt-downloader
          Icon=yt-downloader
          Terminal=false
          Categories=Utility;Network;
          DESK

          dpkg-deb --build pkg yt-downloader-v${VERSION}-amd64.deb
          echo "✅ .deb built"

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: yt-downloader-v1.3.0-amd64.deb

  # ─── MACOS DMG ─────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install flask pywebview yt-dlp static-ffmpeg pyinstaller
          brew install create-dmg

      - name: Build app
        run: |
          pyinstaller --noconfirm --windowed --onedir \
            --name "YT Downloader" \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --hidden-import yt_dlp \
            --hidden-import webview \
            --hidden-import flask \
            main.py

      - name: Build DMG
        run: |
          create-dmg \
            --volname "YT Downloader" \
            --window-size 660 400 \
            --icon-size 120 \
            --app-drop-link 480 170 \
            "YT-Downloader-v1.3.0.dmg" \
            "dist/YT Downloader.app" || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: YT-Downloader-v1.3.0.dmg

  # ─── CREATE GITHUB RELEASE ─────────────────────────────
  release:
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List files
        run: find . -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "YT Downloader ${{ github.ref_name }}"
          body: |
            ## YT Downloader ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | 🪟 Windows | `YT-Downloader.exe` |
            | 🐧 Linux (Ubuntu/Debian) | `yt-downloader-amd64.deb` |
            | 🍎 macOS | `YT-Downloader.dmg` |

            ### What's New
            - Fixed Choose Folder button threading issue
            - Added Clear History feature
            - Format fallback for YouTube API changes
            - Live download progress and terminal log

            ### Install
            - **Windows:** Run the `.exe` directly
            - **Linux:** `sudo dpkg -i yt-downloader-v1.3.0-amd64.deb`
            - **macOS:** Open DMG → drag to Applications
          files: |
            windows-exe/YT-Downloader.exe
            linux-deb/yt-downloader-v1.3.0-amd64.deb
            macos-dmg/YT-Downloader-v1.3.0.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
